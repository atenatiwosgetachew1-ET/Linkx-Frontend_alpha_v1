							  <script type="text/javascript">

									const CLIPBOARD_STORAGE_KEY = "linkx_graph_clipboard_v1";

									function normalizeClipboardPayload(payload) {
										if (Array.isArray(payload)) {
											const nodes = payload.map(node => ({ ...node }));
											const edges = Array.isArray(payload.__edges)
												? payload.__edges.map(edge => ({ ...edge }))
												: [];
											nodes.__edges = edges;
											return nodes;
										}

										const nodes = Array.isArray(payload?.nodes)
											? payload.nodes.map(node => ({ ...node }))
											: [];
										const edges = Array.isArray(payload?.edges)
											? payload.edges.map(edge => ({ ...edge }))
											: [];
										nodes.__edges = edges;
										return nodes;
									}

									function clipboardArrayToObject(arrPayload) {
										const nodes = Array.isArray(arrPayload)
											? arrPayload.map(node => ({ ...node }))
											: [];
										const edges = Array.isArray(arrPayload?.__edges)
											? arrPayload.__edges.map(edge => ({ ...edge }))
											: [];
										return { nodes, edges };
									}

									function readClipboardFromStorage() {
										try {
											const raw = localStorage.getItem(CLIPBOARD_STORAGE_KEY);
											if (!raw) return normalizeClipboardPayload([]);
											const parsed = JSON.parse(raw);
											return normalizeClipboardPayload(parsed);
										} catch (_err) {
											return normalizeClipboardPayload([]);
										}
									}

									function writeClipboardToStorage(arrPayload) {
										try {
											localStorage.setItem(
												CLIPBOARD_STORAGE_KEY,
												JSON.stringify(clipboardArrayToObject(arrPayload))
											);

								    window.parent.postMessage({ type: "clipboard_get" }, "*");
								    let localClipboard = readClipboardFromStorage();

									let graphThemeMode = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
									function getThemeNodeDefaults(mode) {
										if (mode === "dark") {
											return {
												background: "#080e14",
												border: "#3e5775",
												highlight: { background: "#101822", border: "#4a6484" },
												hover: { background: "#0c131d", border: "#446082" }

											background: "rgba(255,255,255,1)",

									}
									function applyNetworkThemeDefaults(mode) {
								const nodeDefaults = getThemeNodeDefaults(mode);
								const edgeDefaults = getThemeEdgeDefaults(mode);
								if (window.currentOptions?.nodes) window.currentOptions.nodes.color = nodeDefaults;
								if (window.currentOptions?.nodes?.font) window.currentOptions.nodes.font.color = getThemeNodeLabelColor(mode);
								if (window.currentOptions?.edges) window.currentOptions.edges.color = edgeDefaults;
								if (window.network?.setOptions) {
									window.network.setOptions({
										nodes: { color: nodeDefaults, font: { color: getThemeNodeLabelColor(mode) } },
										edges: { color: edgeDefaults }
									});
								}
							}

							function normalizeColorToken(value) {
										return String(value || "").replace(/\s+/g, "").toLowerCase();
									}
									function isWhiteLike(value) {
										const token = normalizeColorToken(value);
										return token === "#fff" || token === "#ffffff" || token === "rgb(255,255,255)" || token === "rgba(255,255,255,1)";
									}
									function isBlackLike(value) {
										const token = normalizeColorToken(value);
										return token === "#000" || token === "#000000" || token === "rgb(0,0,0)" || token === "rgba(0,0,0,1)";
									}
									function isLightDefaultNodeColor(color) {
										if (!color) return true;
										if (typeof color === "string") return isWhiteLike(color);
										const bg = color.background;
										const border = normalizeColorToken(color.border);
										const defaultBorder = border === "" || border === "#555" || border === "#333" || border === "#111" || border === "#777" || border === "#777777";
										return isWhiteLike(bg) && defaultBorder;
									}
									function isLightDefaultEdgeColor(color) {
										if (!color) return true;
										if (typeof color === "string") return isBlackLike(color);
										if (color.inherit === true) return true;
										return isBlackLike(color.color);
									}
									function normalizeIncomingNodeForTheme(node) {
								if (graphThemeMode !== "dark") return node;
								const needsColor = isLightDefaultNodeColor(node?.color);
								const currentFontColor = normalizeColorToken(node?.font?.color);
								const needsFontColor = !currentFontColor || isBlackLike(currentFontColor);
								if (!needsColor && !needsFontColor) return node;
								const themedNode = { ...node };
								if (needsColor) themedNode.color = getThemeNodeDefaults("dark");
								if (needsFontColor) themedNode.font = { ...(node?.font || {}), color: getThemeNodeLabelColor("dark") };
								return themedNode;
							}
							function normalizeIncomingEdgeForTheme(edge) {
										if (graphThemeMode !== "dark") return edge;
										if (!isLightDefaultEdgeColor(edge?.color)) return edge;
										return { ...edge, color: getThemeEdgeDefaults("dark") };
									}
									function applyThemeDefaultsToExistingGraph(mode) {
								if (mode !== "dark") return;
								if (!window.FULL_GRAPH?.nodes || !window.FULL_GRAPH?.edges) return;
								for (const [nodeId, node] of window.FULL_GRAPH.nodes.entries()) {
									const currentFontColor = normalizeColorToken(node?.font?.color);
									const shouldSetDarkFont = !currentFontColor || isBlackLike(currentFontColor);
									if (isLightDefaultNodeColor(node?.color) || shouldSetDarkFont) {
										window.FULL_GRAPH.nodes.set(nodeId, {
											...node,
											color: isLightDefaultNodeColor(node?.color) ? getThemeNodeDefaults("dark") : node.color,
											font: shouldSetDarkFont ? { ...(node?.font || {}), color: getThemeNodeLabelColor("dark") } : node.font
										});
									}
								}
								for (const [edgeId, edge] of window.FULL_GRAPH.edges.entries()) {
									if (isLightDefaultEdgeColor(edge?.color)) {
										window.FULL_GRAPH.edges.set(edgeId, { ...edge, color: getThemeEdgeDefaults("dark") });
									}
								}
								if (typeof renderVisibleGraphBatch === "function") renderVisibleGraphBatch();
							}
							window.addEventListener("message", e => {
										if (e.data.type === "clipboard_data") {
									    	localClipboard = normalizeClipboardPayload(e.data.payload);
									    	writeClipboardToStorage(localClipboard);
										}
									if (e.data?.action === "theme_mode") {
										graphThemeMode = e.data.payload === "dark" ? "dark" : "light";
										document.documentElement.setAttribute("data-theme", graphThemeMode);
										applyThemeDefaultsToExistingGraph(graphThemeMode);
										applyNetworkThemeDefaults(graphThemeMode);
									}
									if (e.data?.type === "init_graph") {
										graphData = e.data.payload;
										initializeFullGraph(graphData);
									}
								});

								window.addEventListener("storage", e => {
									if (e.key !== CLIPBOARD_STORAGE_KEY || !e.newValue) return;
									try {
										const parsed = JSON.parse(e.newValue);
										localClipboard = normalizeClipboardPayload(parsed);
									} catch (_err) {
										// ignore malformed values
									}
								});
							    
							    // Make nodesData and edgesData accessible globally for updates
							    window.nodesData = nodesData;
							    window.edgesData = edgesData;

							    var container = document.getElementById('mynetwork');
							    var data = {
							      nodes: nodesData,
							      edges: edgesData
							    };
							    // Global options that reflect runtime changes (gets updated along side the option, (used for export purpose))
								const STABLE_PHYSICS = {
									enabled: true,

									stabilization: {
										enabled: true,
										iterations: 350,
										fit: true
									},
									barnesHut: {
										gravitationalConstant: -14500, // strong clustering
										springLength: 12,              // still tight, but not rigid
										springConstant: 0.06,          // snap without oscillation
										damping: 0.85                  // energy dissipation (anti-wobble)
									},
									maxVelocity: 18,   // still fast
									minVelocity: 2.5,  // stops micro jitter
									timestep: 0.6      // fast but stable
									};
								
								window.currentOptions = {
									nodes: {
										shape: "dot",
										size: 15,
										font: { size: 16, color: getThemeNodeLabelColor(graphThemeMode) },
										borderWidth: 1.3,
										borderWidthSelected: 2,
										margin: 5,
										color: getThemeNodeDefaults(graphThemeMode)
									},									  
									edges: {
										arrows: "to",
										width: 0.85, // default thin stroke
										hoverWidth: 1.05,
										selectionWidth: 1.15,
										title: undefined, // default no title
										font: {
										    size: 10
										},
										color: getThemeEdgeDefaults(graphThemeMode),										
smooth: {
											type: "dynamic",
											roundness: 0.1
										}

									},
									interaction: { hover: true, multiselect: true },
									physics:  STABLE_PHYSICS,
									layout: {}
								};

								// initial options that reflect before runtime changes
							    const options = {
									nodes: {
										shape: "dot",
										size: 15,
										font: { size: 16, color: getThemeNodeLabelColor(graphThemeMode) },
										borderWidth: 1.3,
										borderWidthSelected: 2,
										margin: 5,
										color: getThemeNodeDefaults(graphThemeMode)
									},									  
									edges: {
										arrows: "to",
										width: 0.85, // default thin stroke
										hoverWidth: 1.05,
										selectionWidth: 1.15,
										title: undefined, // default no title

										    size: 10

									interaction: { hover: true, multiselect: true },
									physics:  STABLE_PHYSICS,
									layout: {}

							    var network = new vis.Network(container, data, options);
									window.network = network;
									applyNetworkThemeDefaults(graphThemeMode);
									network.setOptions({ physics: STABLE_PHYSICS });								


// ------------------------------------------------------------------------------------------------------------------------ Adjustments starts
							    //Store original duplicates
							    // authoritative full graph (FAST, NO OBSERVERS)
								// ================= FULL GRAPH (FAST, NO VIS) =================
								window.FULL_GRAPH = {
									nodes: new Map(),        // id → base node
									edges: new Map(),        // id → base edge
									adjacency: new Map()     // id → Set<neighborId>
								};

								window.MODIFIED_NODES = new Map(); // id → patch object
								window.MODIFIED_EDGES = new Map();

								const VISIBLE_STATE = {
									nodes: new Set(),
									edges: new Set(),
									limit: 25
								};
								
								function initializeFullGraph(graphData) {
									console.log("Initializing FULL_GRAPH with provided graph data...");
									
									FULL_GRAPH.nodes.clear();
									FULL_GRAPH.edges.clear();
									FULL_GRAPH.adjacency.clear();

									// Batch process nodes - NO vis updates during initialization
									const nodeMap = new Map();
									
									// First pass: store all nodes in FULL_GRAPH only
									for (const rawNode of graphData.nodes) {
										const node = normalizeIncomingNodeForTheme(rawNode);
										FULL_GRAPH.nodes.set(node.id, node);
										FULL_GRAPH.adjacency.set(node.id, new Set());
										nodeMap.set(node.id, node);
									}

									// Second pass: process edges in batches
									const edgeMap = new Map();
									for (const rawEdge of graphData.edges) {
										const edge = normalizeIncomingEdgeForTheme(rawEdge);
										const id = edge.id ?? `${edge.from}_${edge.to}`;
										// Store edge with minimal processing
										const weightedEdge = {
											...edge,
											id,
											width: edge.weight ?? 1, // Default
											title: edge.title || undefined // Only set title if it exists
										};
										
										FULL_GRAPH.edges.set(id, weightedEdge);
										edgeMap.set(id, weightedEdge);
										
										// Update adjacency
										const fromSet = FULL_GRAPH.adjacency.get(edge.from);
										const toSet = FULL_GRAPH.adjacency.get(edge.to);
										if (fromSet) fromSet.add(edge.to);
										if (toSet) toSet.add(edge.from);
									}

									// CRITICAL: Don't add nodes to vis yet for large graphs
									if (FULL_GRAPH.nodes.size <= 5000) {
										// Only add to vis if graph is reasonably sized
										nodesData.add([...nodeMap.values()]);
										edgesData.add([...edgeMap.values()]);
									}

									// Skip title generation completely for large graphs
									if (FULL_GRAPH.nodes.size > 1000) {
										showTitles = false;
									}

									// Apply limit WITHOUT rendering
									VISIBLE_STATE.nodes.clear();
									VISIBLE_STATE.edges.clear();
									
									// Just take first N nodes without sorting
									const iterator = FULL_GRAPH.nodes.keys();
									for (let i = 0; i < 25; i++) {
										const { value, done } = iterator.next();
										if (done) break;
										VISIBLE_STATE.nodes.add(value);
									}
									
									// Batch render visible graph
									renderVisibleGraphBatch();
									
									console.log("FULL_GRAPH initialization complete.");
								}

								// if (areDataSetsEqual(original_nodes, nodesData)) {
								//     modified_nodes = new vis.DataSet(nodesData.get());

								// if (areDataSetsEqual(original_edges, edgesData)) {
								//     modified_edges = new vis.DataSet(edgesData.get());

								// Track current node
							    let currentEntityId = null;

								function positionAdjustBox(box, domPosition) {
									const offsetX = 20;
									const offsetY = 20;
									box.style.top = `${domPosition.y + offsetY}px`;
									box.style.left = `${domPosition.x + offsetX}px`;

									const boxRect = box.getBoundingClientRect();
									if (boxRect.right > window.innerWidth) {
										box.style.left = `${window.innerWidth - boxRect.width - 10}px`;
									}
									if (boxRect.bottom > window.innerHeight) {
										box.style.top = `${window.innerHeight - boxRect.height - 10}px`;
									}
								}

								function toDateTimeLocalValue(rawValue) {
									if (!rawValue) return "";
									const date = new Date(rawValue);
									if (Number.isNaN(date.getTime())) return "";
									const year = date.getFullYear();
									const month = String(date.getMonth() + 1).padStart(2, "0");
									const day = String(date.getDate()).padStart(2, "0");
									const hours = String(date.getHours()).padStart(2, "0");
									const minutes = String(date.getMinutes()).padStart(2, "0");
									return `${year}-${month}-${day}T${hours}:${minutes}`;

								function safeNormalizeAttachmentLink(rawLink) {
									if (typeof normalizeExternalLink === "function") {

									const trimmed = String(rawLink || "").trim();
									if (!trimmed) return "";
									if (/^[a-zA-Z][a-zA-Z\d+\-.]*:/.test(trimmed)) return trimmed;
									if (trimmed.startsWith("//")) return `https:${trimmed}`;
									return `https://${trimmed.replace(/^\/+/, "")}`;
								}

								function inferAttachmentPreviewKind(mimeValue, referenceValue) {
									const mime = String(mimeValue || "").toLowerCase();
									if (mime.startsWith("image/")) return "image";
									if (mime.startsWith("audio/")) return "audio";
									if (mime.startsWith("video/")) return "video";

									const ref = String(referenceValue || "").toLowerCase().split(/[?#]/)[0];
									const ext = ref.includes(".") ? ref.split(".").pop() : "";
									if (["png", "jpg", "jpeg", "gif", "bmp", "webp", "svg", "avif"].includes(ext)) return "image";
									if (["mp3", "wav", "ogg", "m4a", "aac", "flac", "opus"].includes(ext)) return "audio";
									if (["mp4", "webm", "mov", "m4v", "ogv", "avi", "mkv"].includes(ext)) return "video";
									return "";
								}

								function renderObjAttachmentPreview(nodeLike = {}) {
									const previewBox = document.getElementById("objAdjustBox_media_preview");
									if (!previewBox) return;

									const attachmentDataUrl = String(nodeLike?.attachmentDataUrl || "").trim();
									const attachmentLinkRaw = String(nodeLike?.attachmentLink || "").trim();
									const attachmentMime = String(nodeLike?.attachmentMime || "").trim().toLowerCase();
									const attachmentName = String(nodeLike?.attachmentName || "").trim();

									let source = "";
									let previewKind = "";
									if (attachmentDataUrl) {
										source = attachmentDataUrl;
										previewKind = inferAttachmentPreviewKind(attachmentMime, attachmentName || attachmentDataUrl);
									} else if (attachmentLinkRaw) {
										source = safeNormalizeAttachmentLink(attachmentLinkRaw);
										previewKind = inferAttachmentPreviewKind(attachmentMime, source);
									}

									if (!source || !previewKind) {
										previewBox.innerHTML = "";
										previewBox.style.display = "none";
										return;
									}

									previewBox.innerHTML = "";
									previewBox.style.display = "block";

									let mediaEl = null;
									if (previewKind === "image") {
										mediaEl = document.createElement("img");
										mediaEl.src = source;
										mediaEl.alt = attachmentName || "Image preview";
									} else if (previewKind === "audio") {
										mediaEl = document.createElement("audio");
										mediaEl.controls = true;
										mediaEl.preload = "metadata";
										mediaEl.src = source;
									} else if (previewKind === "video") {
										mediaEl = document.createElement("video");
										mediaEl.controls = true;
										mediaEl.preload = "metadata";
										mediaEl.src = source;
									}

									if (!mediaEl) {
										previewBox.innerHTML = "";
										previewBox.style.display = "none";
										return;
									}

									mediaEl.addEventListener("error", () => {
										previewBox.innerHTML = `<div class="obj_media_preview_note">Preview is not available for this source.</div>`;
										previewBox.style.display = "block";
									});
									previewBox.appendChild(mediaEl);
								}

								    // Handle Upload
								    const input = document.createElement('input');
								    input.type = "file";
								    input.accept = "image/*"; // accept any image type
								    input.click();

								    input.onchange = () => {
								      const file = input.files[0];
								      if (!file) return;

								      reader.onload = function(e) {

								    };
								  }
